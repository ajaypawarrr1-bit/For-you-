<!DOCTYPE html>
<html>
<head>
<title>For Seju ❤️</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background: pink;
  padding-top:50px;
  overflow:hidden;
}

img{
  width:200px;
  border-radius:20px;
  margin:20px;
}

button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
}

.yes{background:red;color:white;}
.no{background:white;color:red;border:2px solid red;}

.heart{
  position:fixed;
  bottom:0;
  animation:floatUp 4s linear;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div id="content"></div>

<script>

let step = 0;
let noCount = 0;

function nextStep(choice){
  const content = document.getElementById("content");

  if(step === 0){
    content.innerHTML = `
      <h1>Hii Seju ❤️</h1>
      <img src="boy.jpg">
      <br>
      <button class="yes" onclick="nextStep('yes')">Haa Ji</button>
    `;
    step = 1;
  }

  else if(step === 1){
    content.innerHTML = `
      <h2>Tumhe ek baat bataun... agar tum bura mano to?</h2>
      <button class="yes" onclick="nextStep('yes')">Ha bilkul bi</button>
    `;
    step = 2;
  }

  else if(step === 2){
    content.innerHTML = `
      <h2>I really like you ❤️<br>Do you like me?</h2>
      <button class="yes" onclick="nextStep('yes')">Haa</button>
      <button class="no" onclick="noClick()">Nahi</button>
    `;
    step = 3;
  }

  else if(step === 3 && choice === 'yes'){
    content.innerHTML = `
      <h1>I Love You Seju ❤️</h1>
      <img src="girl.jpg">
    `;
  }
}

// 🔥 UPDATED NO FLOW (with return YES)
function noClick(){
  const content = document.getElementById("content");
  noCount++;

  if(noCount === 1){
    content.innerHTML = `
      <h2>Sach me? 😔</h2>
      <button class="no" onclick="noClick()">Nahi</button>
      <button class="yes" onclick="nextStep('yes')">Haa 💕</button>
    `;
  }

  else if(noCount === 2){
    content.innerHTML = `
      <h2>Soch lo 💔</h2>
      <button class="no" onclick="noClick()">Nahi</button>
      <button class="yes" onclick="nextStep('yes')">Haa 💕</button>
    `;
  }

  else if(noCount === 3){
    content.innerHTML = `
      <h2>Please maan ja yarr 🥺</h2>
      <button class="no" onclick="noClick()">Nahi</button>
      <button class="yes" onclick="nextStep('yes')">Haa 💕</button>
    `;
  }

  else{
    content.innerHTML = `
      <h2>Sorry I behave like this... Goodbye 💔</h2>
      <button class="yes" onclick="nextStep('yes')">Haa 💕</button>
    `;
  }
}

// ❤️ HEART ANIMATION
function createHeart(){
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*30 + 20) + "px";

  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),4000);
}

setInterval(createHeart,500);

// START
nextStep();

</script>

</body>
</html>
